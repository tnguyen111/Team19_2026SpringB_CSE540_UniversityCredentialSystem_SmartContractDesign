<!DOCTYPE html>
<html lang="en">
<head>
    <title>Issuer Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
</head>
<body>
    <div class="myContainer">
        <header class="title_card d-flex flex-wrap justify-content-center py-3 mb-4 border-bottom">
            <a href="/frontend/index.html" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none">
                <svg class="bi me-2" width="40" height="32"></svg>
                <span class="fs-4" style="color: white;">Credential Verifier</span>
            </a>
        </header>

        <div class="main_content">
            <div class="content_title">
                <h2>Issuer Control Panel</h2>
            </div>

            <div class="control_panel">
                <div id="Issuer_controls">
                    <h3>Issue Credential</h3>
                    <input type="text" id="userAddress" placeholder="User address">
                    <input type="text" id="credentialType" placeholder="Credential type">
                    <input type="text" id="documentHash" placeholder="Document hash (bytes32)">
                    <input type="text" id="ipfsCID" placeholder="IPFS CID">
                    <button type="button" class="btn btn-success" onclick="issueCredential()">Issue</button>

                    <h3>Revoke Credential</h3>
                    <input type="number" id="credentialIdRevoke" placeholder="Credential ID">
                    <button type="button" class="btn btn-danger" onclick="revokeCredential()">Revoke</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <script src="index.js"></script>
</body>
</html>
